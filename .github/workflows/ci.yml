name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: mypy
        run: mypy personal_assistant/

  test:
    name: "Tests: ${{ matrix.name }}"
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "fields (27)"
            file: tests/test_fields.py
          - name: "record (29)"
            file: tests/test_record.py
          - name: "note (11)"
            file: tests/test_note.py
          - name: "note_book (19)"
            file: tests/test_note_book.py
          - name: "address_book (22)"
            file: tests/test_address_book.py
          - name: "handlers (39)"
            file: tests/test_handlers.py
          - name: "storage (15)"
            file: tests/test_storage.py

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: |
          set +e
          pytest "${{ matrix.file }}" -v --tb=short 2>&1 | tee test-output.txt
          code=${PIPESTATUS[0]}
          set -e
          summary=$(tail -1 test-output.txt)
          if echo "$summary" | grep -qE '[0-9]+ xfailed'; then
            xfail=$(echo "$summary" | grep -oE '[0-9]+ xfailed' | grep -oE '^[0-9]+')
            passed=$(echo "$summary" | grep -oE '[0-9]+ passed' | grep -oE '^[0-9]+' || echo "0")
            echo "### ⚠️ ${{ matrix.name }}" >> "$GITHUB_STEP_SUMMARY"
            echo "${passed} passed, **${xfail} not yet implemented** (xfail)" >> "$GITHUB_STEP_SUMMARY"
          else
            passed=$(echo "$summary" | grep -oE '[0-9]+ passed' | grep -oE '^[0-9]+' || echo "0")
            echo "### ✅ ${{ matrix.name }}" >> "$GITHUB_STEP_SUMMARY"
            echo "${passed} passed" >> "$GITHUB_STEP_SUMMARY"
          fi
          exit "$code"
