name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

permissions:
  pull-requests: write
  issues: write

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: mypy
        run: mypy personal_assistant/

  test:
    name: "Tests: ${{ matrix.name }}"
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: fields
            file: tests/test_fields.py
          - name: record
            file: tests/test_record.py
          - name: note
            file: tests/test_note.py
          - name: note_book
            file: tests/test_note_book.py
          - name: address_book
            file: tests/test_address_book.py
          - name: handlers
            file: tests/test_handlers.py
          - name: storage
            file: tests/test_storage.py

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest "${{ matrix.file }}" -v --tb=short

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: always() && github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Generate summary and comment on PR
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Run all tests, capture output
          pytest --tb=no -q 2>&1 | tee test-output.txt || true

          # Parse summary line (e.g. "70 passed, 92 xfailed in 0.29s")
          summary=$(grep -E '(passed|failed|xfailed|error)' test-output.txt | tail -1)
          passed=$(echo "$summary" | grep -oE '[0-9]+ passed' | grep -oE '^[0-9]+' || echo "0")
          xfailed=$(echo "$summary" | grep -oE '[0-9]+ xfailed' | grep -oE '^[0-9]+' || echo "0")
          failed=$(echo "$summary" | grep -oE '[0-9]+ failed' | grep -oE '^[0-9]+' || echo "0")
          errors=$(echo "$summary" | grep -oE '[0-9]+ error' | grep -oE '^[0-9]+' || echo "0")

          # Build per-module table from verbose per-file output
          body="## Test Results"$'\n\n'
          body+="| Module | Passed | XFail | Failed |"$'\n'
          body+="| ------ | :----: | :---: | :----: |"$'\n'

          for file in tests/test_fields.py tests/test_record.py tests/test_note.py \
                      tests/test_note_book.py tests/test_address_book.py \
                      tests/test_handlers.py tests/test_storage.py; do

            module=$(basename "$file" .py | sed 's/^test_//')
            result=$(pytest "$file" --tb=no -q 2>&1 | tail -1)

            p=$(echo "$result" | grep -oE '[0-9]+ passed' | grep -oE '^[0-9]+' || echo "0")
            x=$(echo "$result" | grep -oE '[0-9]+ xfailed' | grep -oE '^[0-9]+' || echo "0")
            f=$(echo "$result" | grep -oE '[0-9]+ failed' | grep -oE '^[0-9]+' || echo "0")

            if [ "$f" != "0" ]; then
              icon="❌"
            elif [ "$x" != "0" ]; then
              icon="⚠️"
            else
              icon="✅"
            fi

            body+="| ${icon} ${module} | ${p} | ${x} | ${f} |"$'\n'
          done

          body+=$'\n'"**Total: ${passed} passed"
          [ "$xfailed" != "0" ] && body+=", ${xfailed} xfailed"
          [ "$failed" != "0" ] && body+=", ${failed} failed"
          [ "$errors" != "0" ] && body+=", ${errors} errors"
          body+="**"$'\n\n'
          body+="_Auto-generated by CI_"

          # Update or create PR comment (look for existing by marker)
          existing=$(gh pr view "$PR_NUMBER" --json comments --jq \
            '.comments[] | select(.body | contains("Auto-generated by CI")) | .url' \
            | head -1)

          if [ -n "$existing" ]; then
            comment_id=$(basename "$existing" | grep -oE '[0-9]+')
            gh api "repos/${{ github.repository }}/issues/comments/${comment_id}" \
              -X PATCH -f body="$body"
          else
            gh pr comment "$PR_NUMBER" --body "$body"
          fi
